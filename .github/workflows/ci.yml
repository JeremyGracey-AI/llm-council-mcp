name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run offline pipeline test (mocked OpenRouter, no API calls)
        run: PYTHONPATH=. python tests/test_pipeline_mock.py

      - name: Run MCP boot test (server starts, tools register)
        run: PYTHONPATH=. python tests/test_mcp_boot.py
        env:
          OPENROUTER_API_KEY: test-key-not-used
