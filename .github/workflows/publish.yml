name: Publish to PyPI

# Builds and publishes the package when a version tag (v*) is pushed,
# e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup on PyPI: project Settings -> Publishing -> add a trusted
# publisher with:
#   Owner:    JeremyGracey-AI
#   Repo:     llm-council-mcp
#   Workflow: publish.yml
#   Env:      pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
